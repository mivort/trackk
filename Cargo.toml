[package]
name = "trackit"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.98"
clap = "4.5.38"
clap_derive = "4.5.32"
dirs = "6.0.0"
fern = "0.7.1"
json5 = "0.4.1"
log = "0.4.27"
logos = "0.15.0"
regex = "1.11.1"
serde = "1.0.219"
serde_derive = "1.0.219"
serde_json = "1.0.140"
tempfile = "3.20.0"
tera = "1.20.0"
thiserror = "2.0.12"
time = { version = "0.3.41", features = ["macros", "local-offset", "parsing", "formatting"] }
unwrap_or = "1.0.1"
uuid = { version = "1.16.0", features = ["v4", "serde"] }
walkdir = "2.5.0"

[dev-dependencies]
assert_cmd = "2.0.17"
