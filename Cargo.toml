[package]
name = "trackit"
version = "0.1.0"
edition = "2024"

[dependencies]
anstyle = "1.0.11"
anyhow = "1.0.98"
clap = "4.5.40"
clap_derive = "4.5.40"
dirs = "6.0.0"
fern = "0.7.1"
formatx = "0.2.4"
json5 = "0.4.1"
log = "0.4.27"
logos = "0.15.0"
minijinja = "2.10.2"
regex = "1.11.1"
serde = "1.0.219"
serde_derive = "1.0.219"
serde_json = "1.0.140"
tempfile = "3.20.0"
terminal_size = "0.4.2"
thiserror = "2.0.12"
time = { version = "0.3.41", features = ["macros", "local-offset", "parsing", "formatting"] }
unicode-segmentation = "1.12.0"
unicode-width = "0.2.1"
unwrap_or = "1.0.1"
uuid = { version = "1.16.0", features = ["v4", "serde"] }
vte = "0.15.0"
walkdir = "2.5.0"

[dev-dependencies]
assert_cmd = "2.0.17"
